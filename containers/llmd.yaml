id: llmd
name: LLM-Gateway
version: "0.2.0"
description: LLM-Proxy mit Persona-Layer (OpenAI-kompatibel)
category: infrastructure

links:
  homepage: https://github.com/lngstck/llmd

image:
  name: ghcr.io/lngstck/llmd
  tag: "0.2.0"

ports:
  - host: 8320
    container: 8000
    description: API (OpenAI-kompatibel)
    bind: "0.0.0.0"

volumes:
  # llmd liest config.yaml aus /etc/llmd. stackctl schreibt sie direkt in
  # das Host-Verzeichnis und schickt SIGHUP fuer Reload. Schema v2 inlined
  # Provider-Keys und Persona-Prompts in dieser einen Datei.
  # Read-only Mount, daher KEIN owner: — stackctl-User muss schreiben koennen,
  # 0o755/0o644 (von paths.EnsureDir/AtomicWrite gesetzt) reicht dem 1001-User
  # zum Lesen. Siehe ARCHITECTURE.md §16.2.
  - host: /opt/learningstack/llmd/config
    container: /etc/llmd
    readonly: true

depends_on: []

# Bewusst KEIN oidc:-Block — llmd kennt keine User. Zugriffskontrolle
# laeuft per API-Key (bcrypt-gehasht in config.yaml). Die anrufende App
# (Open WebUI etc.) macht ggf. eigene Per-Group-Permissions.
#
# Bewusst KEIN environment:-Block — die gesamte Konfiguration inkl.
# Provider-API-Keys lebt seit Schema v2 in /etc/llmd/config.yaml, von
# stackctl gepflegt. Kein PROVIDER_*_KEY in .env mehr.

post_install:
  messages:
    - "LLM-Gateway laeuft auf Port 8320."
    - "Naechste Schritte zur Inbetriebnahme:"
    - "  1. stackctl llm provider add --id openai --base-url https://api.openai.com --api-key-stdin"
    - "     (Key per stdin paste, damit er nicht in der Shell-History landet)"
    - "  2. stackctl llm persona set grundschul-erklaerer --provider openai --upstream-id gpt-4o-mini"
    - "  3. stackctl llm persona set sek2-helfer --provider openai --upstream-id gpt-4o"
    - "  4. In Open WebUI: Admin -> Models -> Personas fuer Benutzer-Gruppen freigeben"
    - ""
    - "Beispiel-Personas (grundschul-erklaerer, sek2-helfer) sind bereits angelegt"
    - "und tragen ihren System-Prompt inline. Eigene Personas: 'stackctl llm persona add'."
    - "Passthrough (ohne System-Prompt): zusaetzlich '--no-prompt' beim Anlegen."
