id: llmd
name: LLM-Gateway
version: "0.1.0"
description: LLM-Proxy mit Persona-Layer (OpenAI-kompatibel)
category: infrastructure

links:
  homepage: https://github.com/lngstck/llmd

image:
  name: ghcr.io/lngstck/llmd
  tag: "0.1.0"

ports:
  - host: 8320
    container: 8000
    description: API (OpenAI-kompatibel)
    bind: "0.0.0.0"

volumes:
  # llmd liest config.yaml + prompts/ aus /etc/llmd. stackctl schreibt diese
  # Dateien direkt in das Host-Verzeichnis und schickt SIGHUP fuer Reload.
  # Container laeuft als non-root (1001:1001 — image-default von distroless),
  # daher chown auf dieses uid:gid via Throwaway-Container.
  - host: /opt/learningstack/llmd/config
    container: /etc/llmd
    readonly: true
    owner: "1001:1001"

depends_on: []

# Bewusst KEIN oidc:-Block — llmd kennt keine User. Zugriffskontrolle
# laeuft per API-Key (bcrypt-gehasht in config.yaml). Die anrufende App
# (Open WebUI etc.) macht ggf. eigene Per-Group-Permissions.
#
# Bewusst KEIN environment:-Block — die gesamte Konfiguration lebt in
# /etc/llmd/config.yaml, von stackctl gepflegt.
#
# Provider-API-Keys (PROVIDER_OPENAI_KEY etc.) MUESSEN in .env vorhanden
# sein, bevor Requests ans jeweilige Provider durchgehen. Werden ueber
# `stackctl llm provider add` referenziert und vom Admin selbst in .env
# gepflegt (kein Auto-Generate — sind eigene Secrets der Schule).

post_install:
  messages:
    - "LLM-Gateway laeuft auf Port 8320."
    - "Naechste Schritte zur Inbetriebnahme:"
    - "  1. Provider-API-Key in /opt/stackctl/compose/.env eintragen (z.B. PROVIDER_OPENAI_KEY=sk-...)"
    - "  2. stackctl llm provider add --id openai --base-url https://api.openai.com --api-key-env PROVIDER_OPENAI_KEY"
    - "  3. stackctl llm model add --id <id> --provider openai --upstream-id <upstream>"
    - "  4. stackctl llm persona set-model grundschul-erklaerer <model-id>"
    - "  5. stackctl llm persona set-model sek2-helfer <model-id>"
    - "  6. In Open WebUI: Admin -> Models -> Personas fuer Benutzer-Gruppen freigeben"
    - ""
    - "Beispiel-Personas (grundschul-erklaerer, sek2-helfer) sind bereits angelegt,"
    - "warten aber auf Modell-Zuweisung. Eigene Personas: 'stackctl llm persona add'."
