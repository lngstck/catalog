id: open-webui
name: Open WebUI
version: "1.5"
description: Chat-Oberflaeche fuer LLMs
category: education

links:
  homepage: https://openwebui.com
  docs: https://docs.openwebui.com

admin_info:
  login: "admin@{school_slug}.learningstack.online"
  password_hint: "stackctl-Admin-Passwort"
  notes: |
    Der lokale Admin wird nur beim allerersten Start angelegt, wenn die
    Postgres-Datenbank `open_webui` leer ist. War die App vorher schon
    installiert, muss beim Entfernen die Option "Daten loeschen" aktiviert
    sein, damit der Admin neu geseedet wird.
    OIDC-Schullogin laeuft parallel — Lehrkraefte/Schueler kommen ueber den
    Schullogin-Button rein und bleiben User.

image:
  name: ghcr.io/open-webui/open-webui
  tag: "0.9.5"

ports:
  - host: 8310
    container: 8080
    description: Web UI

volumes:
  - host: /opt/learningstack/open-webui/data
    container: /app/backend/data

depends_on:
  - postgres
  - dex

oidc:
  client_id: open-webui
  redirect_path: /oauth/oidc/callback

environment:
  # OIDC via Dex
  - key: ENABLE_OAUTH_SIGNUP
    value: "true"
  - key: OAUTH_PROVIDER_NAME
    value: Schullogin
  - key: OAUTH_CLIENT_ID
    value: open-webui
  - key: OAUTH_CLIENT_SECRET
    value: "${OPEN_WEBUI_OIDC_SECRET}"
  - key: OPENID_PROVIDER_URL
    value: "${DEX_AUTH_URL}/.well-known/openid-configuration"
  - key: OAUTH_SCOPES
    value: "openid profile email groups"
  # Anzeige-Name = Vorname (moin.schule liefert aktuell keinen Vollnamen).
  # "email" ist der stabile App-Identifier — vom zentralen Dex gemapped
  # auf moin.schules opaken sub (nicht echte E-Mail, aber stabil+eindeutig).
  - key: OAUTH_USERNAME_CLAIM
    value: name
  - key: OAUTH_EMAIL_CLAIM
    value: email
  # Rollen-Mapping: Lehr/Leit/Lern duerfen rein, aber KEIN OIDC-User wird Admin.
  # Admin ist ausschliesslich der via WEBUI_ADMIN_* geseedete Account.
  - key: ENABLE_OAUTH_ROLE_MANAGEMENT
    value: "true"
  - key: OAUTH_ROLES_CLAIM
    value: groups
  - key: OAUTH_ALLOWED_ROLES
    value: "Lehr,Leit,Lern"
  - key: OAUTH_ADMIN_ROLES
    value: ""
  # Lokaler Admin-Account beim ersten Start anlegen (verhindert, dass der
  # erste OIDC-Login automatisch Admin wird). Login via /auth-Formular.
  - key: WEBUI_ADMIN_EMAIL
    value: "admin@${SCHOOL_SLUG}.learningstack.online"
  - key: WEBUI_ADMIN_PASSWORD
    value: "${ADMIN_PASSWORD}"
  - key: WEBUI_ADMIN_NAME
    value: "Admin"
  # PostgreSQL statt SQLite — eigener User/DB pro App (stackctl legt sie an).
  - key: DATABASE_URL
    value: "postgresql://open_webui:${OPEN_WEBUI_DB_PASSWORD}@ls-postgres:5432/open_webui"
  # LLM-Anbindung
  - key: OPENAI_API_BASE_URL
    value: "${LLM_ENDPOINT}"
  - key: OPENAI_API_KEY
    value: "${LLM_API_KEY}"
  # Session-Secret
  - key: WEBUI_SECRET_KEY
    value: "${OPEN_WEBUI_SECRET_KEY}"
  # UI
  - key: WEBUI_NAME
    value: "${SCHOOL_NAME} KI-Chat"
  - key: DEFAULT_USER_ROLE
    value: user
  # Signup deaktivieren — neue User kommen ueber OIDC, lokal nur der Admin.
  - key: ENABLE_SIGNUP
    value: "false"
  - key: ENABLE_LOGIN_FORM
    value: "true"
  - key: WEBUI_AUTH
    value: "true"
  # env-Werte MUESSEN bei jedem Start gewinnen, sonst friert Open WebUI die
  # OIDC-/Admin-Einstellungen nach dem ersten Lauf in der DB ein.
  - key: ENABLE_PERSISTENT_CONFIG
    value: "false"

secrets:
  - key: OPEN_WEBUI_OIDC_SECRET
    generate: secret
  - key: OPEN_WEBUI_SECRET_KEY
    generate: secret

global_env:
  - key: LLM_ENDPOINT
    description: OpenAI-kompatibler LLM-Endpunkt
    required: false
    default: https://llm.learningstack.online/v1
  - key: LLM_API_KEY
    description: API-Key fuer LLM-Proxy
    required: false

post_install:
  messages:
    - "Open WebUI: http://{server_domain}:8310"
    - "Lokaler Admin: admin@{school_slug}.learningstack.online + stackctl-Admin-Passwort"
    - "Lehrkraefte/Schueler melden sich ueber Schullogin (OIDC via Dex) an — alle als User"
    - "OIDC funktioniert nur mit aktivem Tunnel"
  secrets_to_show:
    - key: OPEN_WEBUI_OIDC_SECRET
      label: OIDC-Secret
    - key: OPEN_WEBUI_SECRET_KEY
      label: Session-Secret
