id: dex
name: Dex (OIDC)
version: "1.2"
description: OIDC-Provider (Proxy zu moin.schule)
category: infrastructure

links:
  homepage: https://dexidp.io
  docs: https://dexidp.io/docs/

image:
  name: ghcr.io/dexidp/dex
  tag: "v2.45.1"

# Dex nutzt SQLite unter /data/dex.db (Expiry-Werte sind in der von stackctl
# generierten config.yaml gesetzt). Kein Postgres-Dependency.
command:
  - dex
  - serve
  - /etc/dex/config.yaml

ports:
  - host: 5556
    container: 5556
    description: OIDC-Endpunkt
    bind: "0.0.0.0"

volumes:
  # Dex laeuft im Image als non-root User 1001:1001 — /data muss uid 1001
  # gehoeren, damit Dex dort die SQLite-DB schreiben kann.
  - host: /opt/learningstack/dex/data
    container: /data
    owner: "1001:1001"
  # /etc/dex wird NICHT gechownt — das Config-Verzeichnis bleibt
  # stackctl-writable, damit nachfolgende dex.SaveConfig-Aufrufe
  # (bei jedem App-Install/Remove) funktionieren. Die config.yaml wird
  # world-readable geschrieben (0644), Dex liest sie als uid 1001.
  - host: /opt/learningstack/dex/config
    container: /etc/dex
    readonly: true

# dex-config.yaml wird von stackctl komplett verwaltet: stackctl schreibt
# sie nach /opt/learningstack/dex/config/config.yaml bei Setup sowie bei
# jeder App-Installation/Entfernung (via dex.SaveConfig + docker restart).
# Darum KEIN configs:-Block — der wuerde stackctls Datei ueberschreiben.

depends_on: []

post_install:
  messages:
    - "Dex OIDC-Provider laeuft auf Port 5556"
    - "Konfiguration wird von stackctl automatisch verwaltet"
    - "OIDC-URL: ${DEX_AUTH_URL}"
