id: postgres
name: PostgreSQL
version: "1.3"
description: Zentrale Datenbank fuer alle Apps
category: infrastructure

links:
  homepage: https://www.postgresql.org
  docs: https://www.postgresql.org/docs/18/

image:
  name: postgres
  tag: "18"

ports:
  - host: 8100
    container: 5432
    description: PostgreSQL (nur lokal)
    bind: "127.0.0.1"

volumes:
  # PG18+ haben das PGDATA auf /var/lib/postgresql/18/docker umgestellt.
  # Die offizielle Image-Dokumentation (docker-library/postgres PR #1259)
  # empfiehlt, das Parent-Verzeichnis /var/lib/postgresql zu mounten —
  # so kann man beim Major-Upgrade pg_upgrade --link nutzen, weil alte
  # und neue Version auf demselben Volume liegen.
  # Owner 999:999 = postgres-User im Image; stackctl chownt das Host-
  # Verzeichnis via Throwaway-Container, weil der Non-Root stackctl-User
  # das selbst nicht darf.
  - host: /opt/learningstack/postgres
    container: /var/lib/postgresql
    owner: "999:999"

# Bootstrap-Superuser heisst "postgres" — passend zu psql -U postgres, das
# stackctl fuer SetupAppDB benutzt. Jede App bekommt einen eigenen User/DB
# (= sanitized App-ID) mit eigenem Passwort in {APP_ID}_DB_PASSWORD.
environment:
  - key: POSTGRES_USER
    value: postgres
  - key: POSTGRES_PASSWORD
    value: "${POSTGRES_PASSWORD}"
  - key: POSTGRES_DB
    value: postgres

secrets:
  - key: POSTGRES_PASSWORD
    generate: password

depends_on: []

post_install:
  messages:
    - "PostgreSQL laeuft auf localhost:8100 (nur lokal)"
    - "Bootstrap-Benutzer: postgres"
    - "Andere Apps erhalten eigene DB-User/Datenbanken beim Install"
  secrets_to_show:
    - key: POSTGRES_PASSWORD
      label: PostgreSQL-Bootstrap-Passwort
