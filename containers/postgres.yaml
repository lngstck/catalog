id: postgres
name: PostgreSQL
version: "1.2"
description: Zentrale Datenbank fuer alle Apps
category: infrastructure

links:
  homepage: https://www.postgresql.org
  docs: https://www.postgresql.org/docs/18/

image:
  name: postgres
  tag: "18"

ports:
  - host: 8100
    container: 5432
    description: PostgreSQL (nur lokal)
    bind: "127.0.0.1"

volumes:
  # Direkt auf PGDATA mounten — die Postgres-Official-Image Entrypoint
  # erwartet das Verzeichnis als Mount, nicht das Parent-Dir. Mount auf
  # /var/lib/postgresql (Parent) fuehrt zu "cannot create directory"
  # weil die Entrypoint dort keinen Unterordner anlegen kann.
  - host: /opt/learningstack/postgres/data
    container: /var/lib/postgresql/data

# Bootstrap-Superuser heisst "postgres" — passend zu psql -U postgres, das
# stackctl fuer SetupAppDB benutzt. Jede App bekommt einen eigenen User/DB
# (= sanitized App-ID) mit eigenem Passwort in {APP_ID}_DB_PASSWORD.
environment:
  - key: POSTGRES_USER
    value: postgres
  - key: POSTGRES_PASSWORD
    value: "${POSTGRES_PASSWORD}"
  - key: POSTGRES_DB
    value: postgres

secrets:
  - key: POSTGRES_PASSWORD
    generate: password

depends_on: []

post_install:
  messages:
    - "PostgreSQL laeuft auf localhost:8100 (nur lokal)"
    - "Bootstrap-Benutzer: postgres"
    - "Andere Apps erhalten eigene DB-User/Datenbanken beim Install"
  secrets_to_show:
    - key: POSTGRES_PASSWORD
      label: PostgreSQL-Bootstrap-Passwort
