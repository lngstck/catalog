id: postgres
name: PostgreSQL
version: "1.0"
description: Zentrale Datenbank fuer alle Apps
category: infrastructure

links:
  homepage: https://www.postgresql.org
  docs: https://www.postgresql.org/docs/18/

image:
  name: postgres
  tag: "18"

ports:
  - host: 8100
    container: 5432
    description: PostgreSQL (nur lokal)
    bind: "127.0.0.1"

volumes:
  - host: /opt/learningstack/postgres/data
    container: /var/lib/postgresql

environment:
  - key: POSTGRES_USER
    value: learningstack
  - key: POSTGRES_PASSWORD
    value: "${POSTGRES_PASSWORD}"
  - key: POSTGRES_DB
    value: learningstack

secrets:
  - key: POSTGRES_PASSWORD
    generate: password

depends_on: []

post_install:
  messages:
    - "PostgreSQL laeuft auf localhost:8100 (nur lokal)"
    - "Benutzer: learningstack"
    - "Andere Apps verbinden sich automatisch ueber Docker-Netzwerk"
  secrets_to_show:
    - key: POSTGRES_PASSWORD
      label: PostgreSQL-Passwort
